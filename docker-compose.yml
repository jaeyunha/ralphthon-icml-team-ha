services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ralph_review
      POSTGRES_USER: ralph
      POSTGRES_PASSWORD: ralph
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ralph -d ralph_review"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - ralph_postgres_data:/var/lib/postgresql/data

volumes:
  ralph_postgres_data:
